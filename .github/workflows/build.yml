name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/CarReports.Web/CarReports.Web.csproj -r win-x64

      - name: Build (Release)
        run: dotnet build src/CarReports.Web/CarReports.Web.csproj -c Release --no-restore

      - name: Publish self-contained (win-x64, single-file)
        run: dotnet publish src/CarReports.Web/CarReports.Web.csproj -c Release --no-build -o publish
